<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CANARY — Deepfake-proof Verification</title>
    <meta name="description" content="Deepfake-proof identity verification. Open protocol, zero dependencies. CANARY protocol demo." />

    <!-- Inline script: restore theme before first paint to avoid flash -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('canary:theme')
          if (t === 'light') document.documentElement.setAttribute('data-theme', 'light')
        } catch (_) {}
      })()
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
